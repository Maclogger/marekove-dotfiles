devices: (
    {
        name: "MX Master 4";
        timeout: 100000;
        smartshift: {
            on: true;
            threshold: 10;
        };
        hiresscroll: {
          hires: false;
          invert: false;
          target: false;
        };
        thumbwheel:
        {
            divert: true;
            invert: false;
            right:
            {
                mode: "OnInterval"
                interval: 2
                action =
                {
                    type: "Keypress"
                    keys: ["KEY_LEFTCTRL", "KEY_KPPLUS"]
                }
            };
            left:
            {
                mode: "OnInterval"
                interval: 2
                action =
                {
                    type: "Keypress"
                    keys: ["KEY_LEFTCTRL", "KEY_KPMINUS"]
                }
            }
        }
        haptic_feedback: {
            enabled: true;
            strength: 15;
            battery_saving: false;
        };
        dpi: 1250;
        buttons: (
            // Thumb button
            {
                cid: 0x1a0;
                action = {
                    type: "Gestures";
                    gestures: (
                        {
                            mode: "OnRelease";
                            direction: "None";
                            haptic_effect: 1;
                            action = {
                                type: "Keypress";
                                keys: ["KEY_PLAYPAUSE"];
                            }
                        },
                        {
                            direction: "Up";
                            mode: "OnRelease";
                            haptic_effect: 1;
                            action = {
                                type: "Keypress";
                                keys: ["KEY_PREVIOUSSONG"];
                            }
                        },
                        {
                            direction: "Down";
                            mode: "OnRelease";
                            haptic_effect: 1;
                            action = {
                                type: "Keypress";
                                keys: ["KEY_NEXTSONG"];
                            }
                        },
                        {
                            direction: "Right";
                            mode: "OnRelease";
                            haptic_effect: 1;
                            action = {
                                type: "Keypress";
                                keys: ["KEY_LEFTMETA", "KEY_J"];
                            }
                        },
                        {
                            direction: "Left";
                            mode: "OnRelease";
                            haptic_effect: 1;
                            action = {
                                type: "Keypress";
                                keys: ["KEY_LEFTMETA", "KEY_K"];
                            }
                        }
                    );
                };
            },
            // Top button
            {
                cid: 0xc4;
                action = {
                    type: "Keypress";
                    keys: ["KEY_LEFTCTRL", "KEY_W"];
                };
            },
            // Third thumb button
            {
                cid: 0xc3;
                action = {
                    type: "Keypress";
                    keys: ["KEY_LEFTMETA"];
                };
            }
        );
    }
);
